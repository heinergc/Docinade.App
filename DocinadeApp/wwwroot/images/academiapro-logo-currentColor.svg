    <path d="M180 258 q40-36 92-20 q30 8 54-18 q10-12 26-30 l22 18 q-18 20-30 34 q-32 34-74 24 q-40-12-76 16z"/>
    <path d="M372 192 l40 10 l-24 32z"/>
    <!-- Bars -->
    <rect x="188" y="260" width="28" height="92" rx="6"/>
    <rect x="230" y="240" width="28" height="112" rx="6"/>
    <rect x="272" y="222" width="28" height="130" rx="6"/>
    <rect x="314" y="206" width="28" height="146" rx="6"/>
    <!-- Book base (left & right pages) -->
    <path d="M64 332 q96-30 160 18 q64-48 160-18 v70 q-98-36-160 10 q-62-46-160-10z"/>
    <path d="M224 374 q32-22 64 0 v32 q-32-20-64 0z"/>
