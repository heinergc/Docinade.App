    <!-- Graduation cap -->
    <path d="M256 88 L128 136 L256 184 L384 136 Z"/>
    <path d="M184 172 q72 28 144 0 v28 q-72 28-144 0z"/>
    <circle cx="392" cy="162" r="10"/>
