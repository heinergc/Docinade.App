<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" aria-labelledby="title desc" role="img">
  <title>AcademiaPro Symbol — currentColor</title>
  <desc>Open book with growth bars, upward arrow, and graduation cap. Color inherits from CSS currentColor.</desc>
