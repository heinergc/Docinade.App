<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo circular -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)"/>
  
  <!-- Icono de rúbrica (tabla) -->
  <g transform="translate(50, 50)">
    <!-- Líneas horizontales -->
    <line x1="10" y1="20" x2="90" y2="20" stroke="white" stroke-width="3"/>
    <line x1="10" y1="45" x2="90" y2="45" stroke="white" stroke-width="3"/>
    <line x1="10" y1="70" x2="90" y2="70" stroke="white" stroke-width="3"/>
    <line x1="10" y1="95" x2="90" y2="95" stroke="white" stroke-width="3"/>
    
    <!-- Líneas verticales -->
    <line x1="10" y1="20" x2="10" y2="95" stroke="white" stroke-width="3"/>
    <line x1="35" y1="20" x2="35" y2="95" stroke="white" stroke-width="3"/>
    <line x1="65" y1="20" x2="65" y2="95" stroke="white" stroke-width="3"/>
    <line x1="90" y1="20" x2="90" y2="95" stroke="white" stroke-width="3"/>
    
    <!-- Marcas de check -->
    <path d="M 20 35 L 25 40 L 30 30" stroke="white" stroke-width="2" fill="none"/>
    <path d="M 73 60 L 78 65 L 83 55" stroke="white" stroke-width="2" fill="none"/>
  </g>
</svg>
